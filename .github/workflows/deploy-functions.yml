name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.29.1

      - name: Install function dependencies
        run: |
          cd functions
          npm install --legacy-peer-deps

      - name: Write service account key
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT_KEY" > /tmp/sa_key.json

      - name: Deploy Firebase Functions
        run: |
          firebase deploy \
            --only functions:generateQuestions,functions:generateAdvisory,functions:checkTestLimit,functions:createOrder,functions:verifyPayment,functions:razorpayWebhook,functions:triggerCacheWarm,functions:getCacheStatus,functions:generateFeedbackInsights,functions:platformHealthCheck,functions:updateCuetIntelligence,functions:grantAdminClaim,functions:returnTestCredit,functions:blockUser,functions:deleteUser,functions:detectAnomalies,functions:refreshGATCurrentAffairs,functions:refreshEconomicsCurrentData,functions:clearAndRebuildSubjectCache \
            --project vantiq-cuet \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json

      - name: Deploy Firestore Rules and Indexes
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project vantiq-cuet \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
