name: Nightly Cache Fill Engine

on:
  schedule:
    - cron: '30 20 * * *'   # 2:00 AM IST (8:30 PM UTC)
    - cron: '0 6 * * *'     # 11:30 AM IST (6:00 AM UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual cache fill'

jobs:
  fill-until-full:
    name: Fill Cache Until Full
    runs-on: ubuntu-latest
    # 12 loops x 12 min each = 144 min max. Kill at 150 if runaway.
    timeout-minutes: 150

    steps:
      - name: Self-looping cache fill engine
        env:
          ADMIN_KEY: ${{ secrets.CACHE_ADMIN_KEY }}
          CF_BASE: https://us-central1-vantiq-cuet.cloudfunctions.net
        run: |
          MAX_LOOPS=12
          LOOP=0
          START_TIME=$(date +%s)
          MOCK_NOW=0
          QP_NOW=0
          GAT_MOCK_NOW=0
          GAT_QP_NOW=0
          ECO_MOCK_NOW=0
          ECO_QP_NOW=0

          # How long to wait after triggering before checking status
          # triggerCacheWarm responds IMMEDIATELY but runs in background for up to 8 min
          # We wait 10 min to be certain the fill run has finished before looping
          FILL_WAIT_SECS=600

          echo "========================================"
          echo "Cache Fill Engine — $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Target: Mock=20 / QP=30 / GAT_Mock=20 / GAT_QP=30 / Eco_Mock=20 / Eco_QP=30 | Max loops: $MAX_LOOPS | Fill wait: ${FILL_WAIT_SECS}s"
          echo "========================================"

          # Initial status check
          INITIAL=$(curl -s -X POST "$CF_BASE/getCacheStatus" \
            -H "x-admin-key: $ADMIN_KEY" -H "Content-Type: application/json" \
            -d '{}' --max-time 15)
          echo "Initial status: $INITIAL"

          MOCK_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status']['Mock']['needed'])" 2>/dev/null || echo "30")
          QP_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status']['QuickPractice']['needed'])" 2>/dev/null || echo "40")
          MOCK_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status']['Mock']['current'])" 2>/dev/null || echo "0")
          QP_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status']['QuickPractice']['current'])" 2>/dev/null || echo "0")
          GAT_MOCK_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_Mock',{}).get('current',0))" 2>/dev/null || echo "0")
          GAT_QP_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_QP',{}).get('current',0))" 2>/dev/null || echo "0")
          GAT_MOCK_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_Mock',{}).get('needed',0))" 2>/dev/null || echo "0")
          GAT_QP_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_QP',{}).get('needed',0))" 2>/dev/null || echo "0")
          ECO_MOCK_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_Mock',{}).get('current',0))" 2>/dev/null || echo "0")
          ECO_QP_NOW=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_QP',{}).get('current',0))" 2>/dev/null || echo "0")
          ECO_MOCK_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_Mock',{}).get('needed',0))" 2>/dev/null || echo "0")
          ECO_QP_NEEDED=$(echo "$INITIAL" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_QP',{}).get('needed',0))" 2>/dev/null || echo "0")

          echo "Mock: $MOCK_NOW/20 (needed: $MOCK_NEEDED) | QP: $QP_NOW/30 (needed: $QP_NEEDED)"
          echo "GAT_Mock: $GAT_MOCK_NOW/20 (needed: $GAT_MOCK_NEEDED) | GAT_QP: $GAT_QP_NOW/30 (needed: $GAT_QP_NEEDED)"
          echo "Eco_Mock: $ECO_MOCK_NOW/20 (needed: $ECO_MOCK_NEEDED) | Eco_QP: $ECO_QP_NOW/30 (needed: $ECO_QP_NEEDED)"

          if [ "$MOCK_NEEDED" = "0" ] && [ "$QP_NEEDED" = "0" ] && [ "$GAT_MOCK_NEEDED" = "0" ] && [ "$GAT_QP_NEEDED" = "0" ] && [ "$ECO_MOCK_NEEDED" = "0" ] && [ "$ECO_QP_NEEDED" = "0" ]; then
            echo "Cache already full. Nothing to do."
            exit 0
          fi

          while [ $LOOP -lt $MAX_LOOPS ]; do
            LOOP=$((LOOP + 1))
            ELAPSED=$(( $(date +%s) - START_TIME ))
            echo ""
            echo "--- Loop $LOOP/$MAX_LOOPS | ${ELAPSED}s elapsed ---"
            echo "    Mock: $MOCK_NOW/20 (needed: $MOCK_NEEDED) | QP: $QP_NOW/30 (needed: $QP_NEEDED)"

            # Trigger fill — responds immediately, runs in background
            WARM=$(curl -s -w "\n%{http_code}" -X POST "$CF_BASE/triggerCacheWarm" \
              -H "x-admin-key: $ADMIN_KEY" -H "Content-Type: application/json" \
              -d '{}' --max-time 30)
            HTTP=$(echo "$WARM" | tail -1)
            BODY=$(echo "$WARM" | head -n -1)
            echo "    Trigger HTTP: $HTTP"

            if [ "$HTTP" != "200" ]; then
              echo "    HTTP $HTTP — waiting 60s then retrying"
              sleep 60
              continue
            fi

            # Check if already locked (previous fill still running from another trigger)
            IS_LOCKED=$(echo "$BODY" | python3 -c               "import json,sys; d=json.load(sys.stdin); print('yes' if d.get('locked') else 'no')" 2>/dev/null || echo "no")

            if [ "$IS_LOCKED" = "yes" ]; then
              LOCK_SINCE=$(echo "$BODY" | python3 -c                 "import json,sys; d=json.load(sys.stdin); print(d.get('lockedSince','unknown'))" 2>/dev/null || echo "unknown")
              echo "    Fill lock held since $LOCK_SINCE — another fill is running. Waiting ${FILL_WAIT_SECS}s..."
              sleep $FILL_WAIT_SECS
            else
              echo "    Fill started. Waiting ${FILL_WAIT_SECS}s for generation to complete..."
              sleep $FILL_WAIT_SECS
            fi

            # Re-check status after waiting
            STATUS=$(curl -s -X POST "$CF_BASE/getCacheStatus" \
              -H "x-admin-key: $ADMIN_KEY" -H "Content-Type: application/json" \
              -d '{}' --max-time 15)

            MOCK_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status']['Mock']['current'])" 2>/dev/null || echo "$MOCK_NOW")
            QP_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status']['QuickPractice']['current'])" 2>/dev/null || echo "$QP_NOW")
            GAT_MOCK_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_Mock',{}).get('current',0))" 2>/dev/null || echo "$GAT_MOCK_NOW")
            GAT_QP_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_QP',{}).get('current',0))" 2>/dev/null || echo "$GAT_QP_NOW")
            GAT_MOCK_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_Mock',{}).get('needed',0))" 2>/dev/null || echo "0")
            GAT_QP_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('GAT_QP',{}).get('needed',0))" 2>/dev/null || echo "0")
            MOCK_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status']['Mock']['needed'])" 2>/dev/null || echo "999")
            QP_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status']['QuickPractice']['needed'])" 2>/dev/null || echo "999")
            ECO_MOCK_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_Mock',{}).get('current',0))" 2>/dev/null || echo "$ECO_MOCK_NOW")
            ECO_QP_NOW=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_QP',{}).get('current',0))" 2>/dev/null || echo "$ECO_QP_NOW")
            ECO_MOCK_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_Mock',{}).get('needed',0))" 2>/dev/null || echo "0")
            ECO_QP_NEEDED=$(echo "$STATUS" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d['status'].get('Economics_QP',{}).get('needed',0))" 2>/dev/null || echo "0")

            echo "    After loop $LOOP: Mock=$MOCK_NOW/20 | QP=$QP_NOW/30 | GAT_Mock=$GAT_MOCK_NOW/20 | GAT_QP=$GAT_QP_NOW/30 | Eco_Mock=$ECO_MOCK_NOW/20 | Eco_QP=$ECO_QP_NOW/30"

            if [ "$MOCK_NEEDED" = "0" ] && [ "$QP_NEEDED" = "0" ] && [ "$GAT_MOCK_NEEDED" = "0" ] && [ "$GAT_QP_NEEDED" = "0" ] && [ "$ECO_MOCK_NEEDED" = "0" ] && [ "$ECO_QP_NEEDED" = "0" ]; then
              ELAPSED=$(( $(date +%s) - START_TIME ))
              echo ""
              echo "========================================"
              echo "CACHE FULLY FILLED"
              echo "  Mock: $MOCK_NOW/20 | QP: $QP_NOW/30 | GAT_Mock: $GAT_MOCK_NOW/20 | GAT_QP: $GAT_QP_NOW/30"
              echo "  Eco_Mock: $ECO_MOCK_NOW/20 | Eco_QP: $ECO_QP_NOW/30"
              echo "  Loops: $LOOP | Time: ${ELAPSED}s"
              echo "========================================"
              exit 0
            fi

            echo "    Not yet full — next loop starting..."
          done

          ELAPSED=$(( $(date +%s) - START_TIME ))
          echo ""
          echo "========================================"
          echo "MAX LOOPS REACHED ($MAX_LOOPS / ${ELAPSED}s)"
          echo "  Mock: $MOCK_NOW/20 (needed: $MOCK_NEEDED)"
          echo "  QP:   $QP_NOW/30 (needed: $QP_NEEDED)"
          echo "  GAT_Mock: $GAT_MOCK_NOW/20 (needed: $GAT_MOCK_NEEDED)"
          echo "  GAT_QP:   $GAT_QP_NOW/30 (needed: $GAT_QP_NEEDED)"
          echo "  Eco_Mock: $ECO_MOCK_NOW/20 (needed: $ECO_MOCK_NEEDED)"
          echo "  Eco_QP:   $ECO_QP_NOW/30 (needed: $ECO_QP_NEEDED)"
          echo "========================================"
          CRITICAL=0
          if [ "$MOCK_NOW" -lt 4 ] 2>/dev/null; then
            echo "CRITICAL: English Mock below threshold — manual fill required"
            CRITICAL=1
          fi
          if [ "$QP_NOW" -lt 6 ] 2>/dev/null; then
            echo "CRITICAL: English QP below threshold — manual fill required"
            CRITICAL=1
          fi
          if [ "$GAT_MOCK_NOW" -lt 4 ] 2>/dev/null; then
            echo "CRITICAL: GAT Mock below threshold — manual fill required"
            CRITICAL=1
          fi
          if [ "$GAT_QP_NOW" -lt 6 ] 2>/dev/null; then
            echo "CRITICAL: GAT QP below threshold — manual fill required"
            CRITICAL=1
          fi
          # Economics only checked when it has been seeded (ECO_MOCK target > 0 means live)
          if [ "$ECO_MOCK_NOW" -gt 0 ] || [ "$ECO_MOCK_NEEDED" -gt 0 ]; then
            if [ "$ECO_MOCK_NOW" -lt 4 ] 2>/dev/null; then
              echo "CRITICAL: Economics Mock below threshold — manual fill required"
              CRITICAL=1
            fi
          fi
          exit $CRITICAL

  summary:
    name: Run Summary
    runs-on: ubuntu-latest
    needs: fill-until-full
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "### Cache Fill Engine — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ needs.fill-until-full.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Dashboard | https://vantiq-cuetmock.netlify.app/admin |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase Logs | https://console.firebase.google.com/project/vantiq-cuet/functions/logs |" >> $GITHUB_STEP_SUMMARY
